name: vidgo_ultra_pro
description: Ultra-fast, multi-platform browser-based video downloader with built-in player, smart video detection, premium UI and advanced download manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  webview_flutter: ^4.8.0
  flutter_inappwebview: ^6.0.0
  google_mobile_ads: ^5.1.0
  dio: ^5.5.0+1
  path_provider: ^2.1.4
  path: ^1.9.0
  video_player: ^2.9.2
  flutter_staggered_grid_view: ^0.7.0
  share_plus: ^10.0.2
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
